<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SceneX - Complete Sign Up</title>
    <link rel="stylesheet" href="/static/css/style2.css">
    <link rel="stylesheet" href="/static/bootstrap/css/bootstrap.min.css">
    <link rel="stylesheet" href="/static/css/animate.min.css">
    <link rel="stylesheet" href="/static/fontawesome/css/all.min.css">

   <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,100..1000;1,9..40,100..1000&family=Syne:wght@800&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Palanquin+Dark:wght@700&family=Palanquin:wght@100;200;300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container-fluid auth-shell">

        <div class="row auth-wrap">
            <div class="col-lg-4 offset-lg-1 auth-left">
                <a href="/" class="mb-5 pb-5 " style="padding-bottom: 160px; color: gray; font-size: 0.9rem;">Back to Home</a>
                <div class="sidebar-logo">SceneX</div>
                <h1 class="pt-4">Almost there</h1>
                <p>Just a few more details to finish setting up.</p>
                <div class="auth-features">
                    <div class="feature-item">
                        <i class="fa-solid fa-calendar-check"></i>
                        <span>Discover local events</span>
                    </div>

                    <div class="feature-item">
                        <i class="fa-solid fa-users"></i>
                        <span>Join communities</span>
                    </div>

                    <div class="feature-item">
                        <i class="fa-solid fa-location-dot"></i>
                        <span>Meet people nearby</span>
                    </div>
                </div>
            </div>
            <div class="col-lg-6">
                <div class="auth-card">
                    <div class="auth-step-1">
                        <div class="step-header">
                            <span class="step-badge">Step 2 of 2</span>
                            <h2>Complete your profile</h2>
                            <p>Signing up as <strong>{{ pending.fullname }}</strong> &middot; {{ pending.email }}</p>
                            {% include 'user/alert.html' %}
                        </div>

                        <form action="" method="post" novalidate>
                            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                            <div class="auth-field">
                                <label for="username">Choose a username</label>
                                <input type="text" name="username" id="username" class="form-control" placeholder="Your Username" required>
                            </div>

                            <div class="auth-field password-field">
                                <label for="stateid">State</label>
                                <select name="stateid" id="state" class="form-control">
                                    {% for state in states %}
                                    <option value="{{ state.id }}">{{ state.name }}</option>
                                    {% endfor %}
                                </select>
                            </div>

                            <div class="auth-field">
                                <label>Gender</label>
                                <div class="radio-group">
                                    <label class="radio-option">
                                        <input type="radio" name="gender" value="male" required> Male
                                    </label>
                                    <label class="radio-option">
                                        <input type="radio" name="gender" value="female" required> Female
                                    </label>
                                </div>
                            </div>

                            <div class="auth-field">
                                <label class="checkbox-option">
                                    <input type="checkbox" required>
                                    I agree to the Terms of Service and Privacy Policy
                                </label>
                            </div>
                            <button type="submit" class="btn btn-primary col-12 auth-submit-btn">Finish Sign Up</button>
                        </form>
                    </div>
                </div>
            </div>
        </div>

    </div>

    <script src="/static/bootstrap/js/bootstrap.bundle.min.js"></script>
    <script src="/static/js/jquery.js"></script>
</body>
</html>
